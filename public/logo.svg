<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="gradient-logo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Glow Ring -->
  <circle cx="50" cy="50" r="42" stroke="url(#gradient-logo)" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 6 30 6" />
  
  <!-- Synchronized checkmark / abstract infinite loop shapes -->
  <g filter="url(#glow)">
    <!-- Path representing 'S' and 'T' check overlay -->
    <path d="M30 45 L45 60 L75 30" stroke="url(#gradient-logo)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M25 55 L45 75 L70 50" stroke="url(#gradient-logo)" stroke-width="4" stroke-opacity="0.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
